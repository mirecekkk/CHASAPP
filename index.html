<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHASA VLKOV - KOMPLETNÍ POS</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- DESIGN SYSTÉM --- */
        :root {
            --bg-body: #dcc8f4;
            --bg-card: #ffffff;
            --text-main: #2c2c2c;
            --accent-primary: #400356;   
            --accent-happy: #ff9800;     
            --accent-success: #28a745;
            --accent-danger: #e74c3c;
            --transition: all 0.3s ease;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.happy-mode {
            --bg-body: #ffe0b2;
            --accent-primary: #e65100;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            transition: var(--transition);
            overflow: hidden;
        }

        /* --- HLAVNÍ PLOCHA --- */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; }

        .top-bar {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .category-nav { display: flex; gap: 10px; align-items: center; }

        .nav-btn {
            padding: 10px 18px; border: none; border-radius: 12px;
            background: #f1f1f1; font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .nav-btn.active { background: var(--accent-primary); color: white; }

        .device-info {
            cursor: pointer;
            font-weight: 700;
            color: var(--accent-primary);
            text-decoration: underline dotted;
            margin-right: 15px;
        }

        /* Happy Hour Styl */
        .happy-panel { display: flex; align-items: center; gap: 15px; padding-left: 20px; border-left: 2px solid #eee; }
        #timer { font-family: monospace; font-size: 1.4rem; font-weight: 700; color: var(--accent-happy); display: none; }
        body.happy-mode #timer { display: block; }
        .happy-trigger { background: var(--accent-happy); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* --- GRID PRODUKTŮ --- */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .product-card {
            background: var(--bg-card); border-radius: 20px; padding: 20px; text-align: center;
            box-shadow: var(--shadow); cursor: pointer; transition: var(--transition);
            border: 2px solid transparent; display: flex; flex-direction: column; height: 210px;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--accent-primary); }
        .price-tag { font-weight: 700; font-size: 1.2rem; color: var(--accent-primary); margin-top: auto; }
        .discount-label { color: var(--accent-danger); font-size: 0.8rem; text-decoration: line-through; margin-right: 5px; }

        /* --- SIDEBAR --- */
        .sidebar { width: 380px; background: var(--bg-card); border-left: 1px solid #eee; display: flex; flex-direction: column; padding: 25px; }
        .cart-items { flex: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px; background: #f9f9f9; border-radius: 10px; margin-bottom: 8px; }
        .total-box { background: #f1f1f1; padding: 20px; border-radius: 20px; text-align: center; }
        .pay-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--accent-success); color: white; font-weight: 700; font-size: 1.2rem; cursor: pointer; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 750px; height: 90vh; border-radius: 25px; padding: 30px; overflow-y: auto; }
        
        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <main class="main-content">
        <header class="top-bar">
            <div class="category-nav">
                <span class="device-info" id="device-display" onclick="changeDeviceID()">Načítám...</span>
                <button class="nav-btn active" onclick="filterKat('vše', this)">Vše</button>
                <button class="nav-btn" onclick="filterKat('Panáky', this)">🥃 Panáky</button>
                <button class="nav-btn" onclick="filterKat('Pivo', this)">🍺 Pivo</button>
                <button class="nav-btn" onclick="filterKat('Vstup', this)">🎟️ Vstup</button>
            </div>

            <div class="happy-panel">
                <div id="timer">02:30:00</div>
                <button class="happy-trigger" onclick="toggleHappyHour()">⚡ HAPPY HOUR</button>
            </div>
        </header>

        <div class="product-grid" id="product-grid"></div>
    </main>

    <aside class="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">Košík</h2>
            <button class="nav-btn" onclick="openStats()">📊 Tržba</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="total-box">
            <div id="total-display" style="font-size: 2.2rem; font-weight: 800; margin-bottom:15px;">0 Kč</div>
            <button class="pay-btn" onclick="processPayment()">ZAPLATIT</button>
        </div>
    </aside>

    <div class="modal" id="stats-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Statistiky</h2>
                <button class="nav-btn" onclick="closeStats()">Zavřít</button>
            </div>
            <div style="height:200px;"><canvas id="sales-chart"></canvas></div>
            <div id="history-log" style="margin-top:20px; border-top:1px solid #eee;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABLHGo6EOkxH18T085E5ZC0T-5IDjS2AU",
            authDomain: "chasapp-6767.firebaseapp.com",
            databaseURL: "https://chasapp-6767-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chasapp-6767",
            storageBucket: "chasapp-6767.firebasestorage.app",
            messagingSenderId: "43938163594",
            appId: "1:43938163594:web:c93eca87f35d47c4eff673"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const barRef = ref(db, 'bar_data/historie');

        // --- KONFIGURACE SORTIMENTU ---
        const sortiment = [
            { nazev: "Slivovice", cena: 50, sleva: 10, kat: "Panáky", icon: "🥃" },
            { nazev: "Hruškovice", cena: 50, sleva: 10, kat: "Panáky", icon: "🥃" },
            { nazev: "Rum", cena: 40, sleva: 5, kat: "Panáky", icon: "🥃" },
            { nazev: "Pivo 12°", cena: 50, sleva: 10, kat: "Pivo", icon: "🍺" },
            { nazev: "Pivo 10°", cena: 40, sleva: 5, kat: "Pivo", icon: "🍺" },
            { nazev: "Vstupné Dospělí", cena: 200, sleva: 0, kat: "Vstup", icon: "🎟️" },
            { nazev: "Vstupné Student", cena: 100, sleva: 0, kat: "Vstup", icon: "🎟️" }
        ];

        let cart = {};
        let currentKat = 'vše';
        let isHappy = false;
        let happyEndTime = null;
        let timerInterval = null;
        let historyData = [];
        let chartInstance = null;

        // --- DEVICE ID (Místo číšníka) ---
        let deviceID = localStorage.getItem('bar_device_id') || 'Pokladna-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('bar_device_id', deviceID);
        document.getElementById('device-display').innerText = `Místo: ${deviceID}`;

        window.changeDeviceID = () => {
            const n = prompt("Zadej název místa (např. Bar, Výčep, Vstup):", deviceID);
            if(n) { deviceID = n; localStorage.setItem('bar_device_id', n); document.getElementById('device-display').innerText = `Místo: ${deviceID}`; }
        };

        // --- HAPPY HOUR ---
        window.toggleHappyHour = () => {
            isHappy = !isHappy;
            document.body.classList.toggle('happy-mode', isHappy);
            clearInterval(timerInterval);
            if(isHappy) {
                happyEndTime = Date.now() + (2.5 * 60 * 60 * 1000);
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderProducts();
        };

        function updateTimer() {
            const diff = happyEndTime - Date.now();
            if(diff <= 0) { toggleHappyHour(); return; }
            const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // --- LOGIKA MENU ---
        window.filterKat = (kat, btn) => {
            currentKat = kat;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts();
        };

        window.renderProducts = () => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            sortiment.filter(p => currentKat === 'vše' || p.kat === currentKat).forEach(p => {
                const finalPrice = isHappy ? (p.cena - p.sleva) : p.cena;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => addToCart(p.nazev, finalPrice);
                card.innerHTML = `<div style="font-size:2.5rem">${p.icon}</div><h3>${p.nazev}</h3><div class="price-tag">${isHappy && p.sleva > 0 ? `<span class="discount-label">${p.cena}</span>`:''}${finalPrice} Kč</div>`;
                grid.appendChild(card);
            });
        };

        // --- KOŠÍK ---
        window.addToCart = (n, c) => {
            if(cart[n]) { cart[n].count++; cart[n].sum += c; }
            else { cart[n] = { count: 1, price: c, sum: c }; }
            updateCartUI();
        };

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            Object.entries(cart).forEach(([n, d]) => {
                total += d.sum;
                container.innerHTML += `<div class="cart-item"><span><strong>${d.count}x</strong> ${n}</span><span>${d.sum} Kč <button onclick="removeFromCart('${n}')" style="border:none; color:red; cursor:pointer; font-weight:bold;">&times;</button></span></div>`;
            });
            document.getElementById('total-display').innerText = `${total} Kč`;
        }

        window.removeFromCart = (n) => {
            cart[n].count--; cart[n].sum -= cart[n].price;
            if(cart[n].count <= 0) delete cart[n];
            updateCartUI();
        }

        window.processPayment = () => {
            const total = parseInt(document.getElementById('total-display').innerText);
            if(total === 0) return;
            push(barRef, {
                timestamp: Date.now(),
                cas: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                polozky: {...cart},
                cenaCelkem: total,
                isHappy: isHappy,
                autor: deviceID // Zápis místa do DB
            }).then(() => { cart = {}; updateCartUI(); });
        };

        // --- ANALYTIKA ---
        onValue(barRef, (snap) => { historyData = snap.val() ? Object.values(snap.val()) : []; });

        window.openStats = () => {
            document.getElementById('stats-modal').style.display = 'flex';
            const log = document.getElementById('history-log');
            log.innerHTML = '';
            let total = 0, happyT = 0;
            
            historyData.sort((a,b) => b.timestamp - a.timestamp).forEach(o => {
                total += o.cenaCelkem;
                if(o.isHappy) happyT += o.cenaCelkem;
                log.innerHTML += `<div style="padding:8px 0; border-bottom:1px solid #eee;"><strong>${o.cas} - ${o.cenaCelkem} Kč</strong> [${o.autor || '?'}]<br><small>${Object.entries(o.polozky).map(([n,d])=>`${d.count}x ${n}`).join(', ')}</small></div>`;
            });

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('sales-chart'), {
                type: 'doughnut',
                data: { labels: ['Klasika', 'Happy Hour ⚡'], datasets: [{ data: [total-happyT, happyT], backgroundColor: ['#400356', '#ff9800'] }] }
            });
        };

        window.closeStats = () => document.getElementById('stats-modal').style.display = 'none';

        renderProducts();
    </script>
</body>
</html>
